        // Touch Support
        widget.addEventListener('touchstart', (e) => {
            isDragging = true; const touch = e.touches[0]; startX = touch.clientX; startY = touch.clientY;
            const rect = widget.getBoundingClientRect();
            initialLeft = rect.left + rect.width / 2; initialTop = rect.top + rect.height / 2;
            widget.style.transition = 'none';
        }, {passive: true});
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return; const touch = e.touches[0];
            widget.style.left = (initialLeft + (touch.clientX - startX)) + 'px';
            widget.style.top = (initialTop + (touch.clientY - startY)) + 'px';
        }, {passive: false});
        document.addEventListener('touchend', () => isDragging = false);

                document.getElementById("loginBox").style.display = "none";
                document.getElementById("signalBox").style.display = "flex";

                setTimeout(() => coin.remove(), 5000);
            }, 400);
        }
    </script>
